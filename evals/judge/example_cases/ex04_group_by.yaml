id: ex04_group_by
category: group_by
description: "Count orders grouped by order status."
input:
  prompt: "How many orders are there for each order status? Sort by the count, highest first."
gold:
  expected_sql: "SELECT order_status, COUNT(*) AS order_count FROM Orders GROUP BY order_status ORDER BY order_count DESC"
  expected_tool_trajectory: ["text2sql"]
