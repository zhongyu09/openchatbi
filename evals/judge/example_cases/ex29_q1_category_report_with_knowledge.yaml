id: ex29_q1_category_report_with_knowledge
category: report
description: "Knowledge-assisted Q1 order report by normalized product category."
input:
  prompt: "Generate a Q1 2024 product category order report using the product_name category rule and save it."
gold:
  expected_sql: "SELECT CASE WHEN INSTR(p.product_name, '-') > 0 THEN SUBSTR(p.product_name, 1, INSTR(p.product_name, '-') - 1) ELSE p.product_name END AS category, COUNT(DISTINCT oi.order_id) AS order_count FROM Order_Items oi JOIN Orders o ON oi.order_id = o.order_id JOIN Products p ON oi.product_id = p.product_id WHERE o.date_order_placed >= '2024-01-01' AND o.date_order_placed < '2024-04-01' GROUP BY category ORDER BY order_count DESC"
  expected_tool_trajectory: ["search_knowledge", "text2sql", "save_report"]
  expected_result_contains: ["report", "category"]
