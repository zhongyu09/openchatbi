id: ex23_category_normalization
category: aggregation
description: "Normalize product_name into product category before aggregation."
input:
  prompt: "Count orders by product category using the product_name prefix before a dash."
gold:
  expected_sql: "SELECT CASE WHEN INSTR(p.product_name, '-') > 0 THEN SUBSTR(p.product_name, 1, INSTR(p.product_name, '-') - 1) ELSE p.product_name END AS category, COUNT(DISTINCT oi.order_id) AS order_count FROM Order_Items oi JOIN Products p ON oi.product_id = p.product_id GROUP BY category ORDER BY order_count DESC"
  expected_tool_trajectory: ["text2sql"]
  expected_result_contains: ["category", "order"]
