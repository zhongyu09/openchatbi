id: c09_timerange
category: timerange
description: "month-over-month revenue comparison"
input:
  prompt: "Compare this month's revenue to last month"
cassette: cassettes/c09_timerange.jsonl
gold:
  expected_sql: "SELECT date_trunc('month', order_date) AS month, SUM(revenue) AS revenue FROM orders WHERE order_date >= date_trunc('month', CURRENT_DATE) - INTERVAL '1' MONTH GROUP BY 1 ORDER BY 1"
  expected_tool_trajectory: ["text2sql"]
  expected_result_contains: ["month", "revenue"]
