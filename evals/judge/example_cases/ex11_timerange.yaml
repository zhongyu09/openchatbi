id: ex11_timerange
category: timerange
description: "Count orders in an explicit date range."
input:
  prompt: "How many orders were placed in Q1 2024?"
gold:
  expected_sql: "SELECT COUNT(*) AS order_count FROM Orders WHERE date_order_placed >= '2024-01-01' AND date_order_placed < '2024-04-01'"
  expected_tool_trajectory: ["text2sql"]
  expected_result_contains: ["order", "count"]
