suite_name: runledger-openchatbi
agent_command: ["python", "evals/runledger/agent/agent.py"]
mode: replay
cases_path: cases
tool_registry:
  - search_knowledge
  - search_schema
  - show_schema
  - text2sql
  - run_python_code
  - save_report
tool_module: evals.runledger.tools

assertions:
  - type: json_schema
    schema_path: schema.json

budgets:
  max_wall_ms: 20000
  max_tool_calls: 8
  max_tool_errors: 0

regression:
  min_pass_rate: 0.95

baseline_path: ../../baselines/runledger-openchatbi.json
