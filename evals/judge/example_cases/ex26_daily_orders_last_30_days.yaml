id: ex26_daily_orders_last_30_days
category: aggregation
description: "Daily order volume over a rolling 30-day window."
input:
  prompt: "Show daily order volume for the last 30 days."
gold:
  expected_sql: "SELECT date(date_order_placed) AS order_date, COUNT(*) AS order_count FROM Orders WHERE date_order_placed >= date('now', '-30 day') GROUP BY date(date_order_placed) ORDER BY order_date"
  expected_tool_trajectory: ["text2sql"]
  expected_result_contains: ["daily", "order"]
