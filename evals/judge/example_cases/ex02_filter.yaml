id: ex02_filter
category: filter
description: "Filter orders by a single status value (Shipped)."
input:
  prompt: "Show orders whose status is Shipped, including their id, customer, status and placed date."
gold:
  expected_sql: "SELECT o.order_id, c.customer_name, o.order_status, o.date_order_placed FROM Orders o JOIN Customers c ON o.customer_id = c.customer_id WHERE o.order_status = 'Shipped' ORDER BY o.date_order_placed"
  expected_tool_trajectory: ["text2sql"]
